<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>
    <style>
        body { font-family: Arial; margin: 40px; background-color: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 5px; width: 400px; }
        input { padding: 8px; margin: 5px; width: 100%; }
        button { padding: 8px; background-color: #4CAF50; color: white; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Book</h2>

    <form th:action="@{/update/{id}(id=${book.id})}" method="post">
        <input type="text" name="title" th:value="${book.title}" required>
        <input type="text" name="author" th:value="${book.author}" required>
        <input type="text" name="category" th:value="${book.category}" required>
        <input type="number" name="quantity" th:value="${book.quantity}" required>
        <button type="submit">Update Book</button>
    </form>

</div>

</body>
</html>
